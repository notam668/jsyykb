<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#4f46e5" />
    <title>江小医课表系统</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="watermark"></div>
  <div class="app">
    <!-- 顶部标题栏 -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <img src="logo.png" alt="logo" class="logo-icon" style="background: transparent; object-fit: contain; border-radius: 8px;" />
          <div style="display: flex; flex-direction: column;">
            <span class="logo-text" style="line-height: 1.2;">江小医课表系统</span>
            <span style="font-size: 11px; opacity: 0.8; font-weight: normal; letter-spacing: 0.5px; margin-top: 1px;">江苏医药职业学院课表系统</span>
          </div>
        </div>
        <div class="header-meta" id="semesterMeta"></div>
      </div>
    </header>


    <!-- 步骤 1：选择专业 -->
    <section class="card step-card" id="stepMajor">
      <div class="card-title">
        <span class="step-dot">1</span>
        <span>选择专业</span>
      </div>
      <div class="select-wrap">
        <input type="text" id="majorSearch" class="search-input" placeholder="搜索专业名称..." />
        <div class="select-grid" id="majorGrid"></div>
      </div>
    </section>

    <!-- 步骤 2：选择班级 -->
    <section class="card step-card" id="stepClass" style="display:none;">
      <div class="card-title">
        <span class="step-dot">2</span>
        <span>选择班级</span>
        <button type="button" class="btn-back" id="backToMajor">← 返回</button>
      </div>
      <div class="select-wrap">
        <div class="select-grid" id="classGrid"></div>
      </div>
    </section>

    <!-- 课表显示区 -->
    <section class="card schedule-card" id="scheduleCard" style="display:none;">
      <div class="card-title">
        <span class="title-icon">📚</span>
        <span id="scheduleTitle">课表</span>
        <button type="button" class="btn-back" id="backToClass">← 重选</button>
      </div>

      <!-- 周次切换 -->
      <div class="week-switch">
        <button class="week-btn active" data-week="0">总课表</button>
        <div class="week-scroll" id="weekScroll"></div>
      </div>

      <!-- 当前周提示 -->
      <div class="week-hint" id="weekHint"></div>

      <!-- 课表网格 -->
      <div class="schedule" id="schedule"></div>

      <!-- 无课时显示 -->
      <div class="empty" id="scheduleEmpty" style="display:none;">
        <div class="empty-icon">🎈</div>
        <div>该周没有课程安排</div>
      </div>
    </section>

    <!-- 底部 -->
    <footer class="footer">
      <div>数据基于江苏医药职业学院教学管理部课表文件生成</div>
      <div class="footer-sub">如有疑问，请以正式通知为准</div>
    </footer>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
